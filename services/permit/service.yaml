service:
  name: "permit-service"
  version: "1.0.0"
  owner: "safety-operations-team"
  description: "Enterprise Permit-to-Work Service owning the complete permit-to-work lifecycle, risk assessments, LOTO isolations, and compliance certificates"

runtime:
  http: true
  grpc: true

database:
  type: "postgres"
  migrations: true

cache:
  redis: true

messaging:
  kafka: true

storage:
  s3: true

security:
  jwt: true
  rbac: true

observability:
  tracing: true
  metrics: true

deployment:
  replicas: 3
  port: 8085

health:
  readiness: true
  liveness: true
