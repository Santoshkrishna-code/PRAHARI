server:
  port: 8098
  read_timeout: 15s
  write_timeout: 15s

database:
  url: "postgres://prahari:prahari@localhost:5432/occupational_health_db?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 10

redis:
  address: "localhost:6379"
  db: 16

kafka:
  brokers:
    - "localhost:9092"
  consumer_group: "occupational-health-service"

identity:
  grpc_address: "localhost:9090"

workflow:
  grpc_address: "localhost:9091"

contractor:
  grpc_address: "localhost:8089"

compliance:
  grpc_address: "localhost:8095"

audit:
  grpc_address: "localhost:8096"

incident:
  grpc_address: "localhost:8084"

inspection:
  grpc_address: "localhost:8086"

risk:
  grpc_address: "localhost:8094"

permit:
  grpc_address: "localhost:8082"

training:
  grpc_address: "localhost:8097"

storage:
  s3_bucket: "prahari-health-evidence"
  s3_region: "ap-south-1"

logging:
  level: "debug"
  format: "json"

telemetry:
  sample_rate: 1.0
  exporter: "stdout"
