openapi: 3.0.3
info:
  title: PRAHARI Auth Service API
  description: API contract specifications for User authentication, Registration, and JWT token management.
  version: 1.0.0
servers:
  - url: http://localhost:8001
    description: Local Dev Server
paths:
  /api/v1/auth/register:
    post:
      summary: Register a new user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '400':
          $ref: '#/components/responses/400Error'
        '422':
          $ref: '#/components/responses/422Error'

  /api/v1/auth/login:
    post:
      summary: Authenticate user credentials
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/401Error'

  /api/v1/auth/refresh:
    post:
      summary: Refresh active JWT access tokens
      operationId: refreshToken
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Tokens refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/401Error'

  /api/v1/auth/profile:
    get:
      summary: Retrieve current authenticated user profile
      operationId: getUserProfile
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Profile retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '401':
          $ref: '#/components/responses/401Error'

  /health/live:
    get:
      summary: Liveness health check
      responses:
        '200':
          description: Service is running

  /health/ready:
    get:
      summary: Readiness health check
      responses:
        '200':
          description: Service dependencies are healthy

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    RegisterRequest:
      type: object
      required:
        - email
        - password
        - role
        - first_name
        - last_name
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
        role:
          type: string
          enum: [Worker, SafetySupervisor, PlantManager]
        first_name:
          type: string
        last_name:
          type: string

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        id_token:
          type: string
        refresh_token:
          type: string
        expires_in:
          type: integer

    UserResponse:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        role:
          type: string
        first_name:
          type: string
        last_name:
          type: string

    ErrorEnvelope:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
            message:
              type: string
            details:
              type: array
              items:
                type: object

  responses:
    400Error:
      description: Bad Request (Malformed parameters)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    401Error:
      description: Unauthenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
    422Error:
      description: Validation Failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
