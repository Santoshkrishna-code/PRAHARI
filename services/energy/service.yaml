service:
  name: "energy-service"
  version: "1.0.0"
  owner: "energy-management-and-facility-utilities-team"
  description: "Enterprise Energy Management Service for industrial energy tracking, smart utility meter monitoring, energy baselines, demand forecasting, and efficiency optimization recommendations"

runtime:
  http: true
  grpc: true

database:
  type: "postgres"
  migrations: true

cache:
  redis: true

messaging:
  kafka: true

storage:
  s3: true

security:
  jwt: true
  rbac: true

observability:
  tracing: true
  metrics: true

deployment:
  replicas: 3
  port: 8101

health:
  readiness: true
  liveness: true
