server:
  port: 8101
  read_timeout: 15s
  write_timeout: 15s

database:
  url: "postgres://prahari:prahari@localhost:5432/energy_db?sslmode=disable"
  max_open_conns: 25
  max_idle_conns: 10

redis:
  address: "localhost:6379"
  db: 19

kafka:
  brokers:
    - "localhost:9092"
  consumer_group: "energy-service"

identity:
  grpc_address: "localhost:9090"

workflow:
  grpc_address: "localhost:9091"

environmental:
  grpc_address: "localhost:8099"

esg:
  grpc_address: "localhost:8100"

asset:
  grpc_address: "localhost:8088"

maintenance:
  grpc_address: "localhost:8087"

storage:
  s3_bucket: "prahari-energy-evidence"
  s3_region: "ap-south-1"

logging:
  level: "debug"
  format: "json"

telemetry:
  sample_rate: 1.0
  exporter: "stdout"
