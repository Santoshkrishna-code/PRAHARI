# ==============================================================================
# PRAHARI GolangCI-Lint Configuration
# ==============================================================================
run:
  timeout: 5m
  issues-exit-code: 1
  tests: true

linters-settings:
  govet:
    check-shadowing: true
  errcheck:
    check-blank: true
    check-type-assertions: true
  gosec:
    severity: "medium"
    confidence: "medium"
  revive:
    rules:
      - name: exported
        severity: warning
      - name: package-comments
        severity: warning

linters:
  disable-all: true
  enable:
    - govet
    - errcheck
    - staticcheck
    - gosimple
    - ineffassign
    - typecheck
    - gosec
    - revive
    - gofmt
    - bodyclose

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
