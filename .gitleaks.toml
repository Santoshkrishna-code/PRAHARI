# ==============================================================================
# PRAHARI Gitleaks Secrets Detection Configuration
# ==============================================================================
[title]
rules = "prahari-gitleaks-rules"

[[rules]]
description = "AWS Manager Access Key ID"
regex = '''(A3T[A-Z0-9]|AKIA|AGPA|AIDA|AROA|ASCA|ASIA)[A-Z0-9]{16}'''
tags = ["key", "AWS"]

[[rules]]
description = "AWS Secret Access Key"
regex = '''(?i)aws_(?:secret|key|token)?\s*[:=]\s*['"]?([a-zA-Z0-9/+=]{40})['"]?'''
tags = ["key", "AWS"]

[[rules]]
description = "Generic Cryptographic Private Key"
regex = '''-----BEGIN[ A-Z0-9_-]+PRIVATE KEY-----'''
tags = ["key", "private-key"]

[[rules]]
description = "JSON Web Token (JWT)"
regex = '''eyJhbGciOiJ[^"\s]+'''
tags = ["token", "JWT"]
