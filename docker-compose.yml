version: '3.8'

services:
  # Relational Database for Transactional microservices (user, permit, plant, assets, incidents)
  postgres:
    image: postgres:15-alpine
    container_name: prahari-postgres
    environment:
      POSTGRES_DB: prahari_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres_secure_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prahari_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # TimescaleDB for high-throughput sensor telemetry (vitals, environment, worker location history)
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: prahari-timescaledb
    environment:
      POSTGRES_DB: prahari_telemetry
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: timescale_secure_pass
    ports:
      - "5433:5432"
    volumes:
      - timescaledb-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d prahari_telemetry"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis for hot-caching active permits, live locations, and lock states
  redis:
    image: redis:7-alpine
    container_name: prahari-redis
    command: redis-server --requirepass redis_secure_pass
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "redis_secure_pass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Apache Kafka (KRaft mode) for event-driven message bus
  kafka:
    image: confluentinc/cp-kafka:7.3.0
    container_name: prahari-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REREPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LIVENESS_TARGET_BUS_COORDINATOR_EVENTS: 'true'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

  # OpenSearch Vector Database for safety procedures RAG and semantic queries
  opensearch:
    image: opensearchproject/opensearch:2.8.0
    container_name: prahari-opensearch
    environment:
      - cluster.name=prahari-cluster
      - node.name=prahari-node
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - DISABLE_INSTALL_DEMO_CONFIG=true
      - DISABLE_SECURITY_PLUGIN=true # In local development, security is disabled for simplicity. Enabled in Terraform.
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch-data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cat/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  # Neo4j Graph Database for tracking site models, physical asset-worker associations and permits Graph
  neo4j:
    image: neo4j:5-community
    container_name: prahari-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/neo4j_secure_pass
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p neo4j_secure_pass 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5

volumes:
  postgres-data:
    driver: local
  timescaledb-data:
    driver: local
  redis-data:
    driver: local
  opensearch-data:
    driver: local
  neo4j-data:
    driver: local
  neo4j-logs:
    driver: local
