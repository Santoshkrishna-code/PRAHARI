name: Deploy to Production

on:
  release:
    types: [ published ]

jobs:
  deploy-production:
    name: Build & Release to Prod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_PROD }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_PROD }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, Tag, and Push Microservices to ECR (Stable Release)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          for service_path in services/*-service; do
            service_name=$(basename $service_path)
            docker build -t $ECR_REGISTRY/prahari-$service_name:$RELEASE_TAG -t $ECR_REGISTRY/prahari-$service_name:latest -f $service_path/Dockerfile .
            docker push $ECR_REGISTRY/prahari-$service_name:$RELEASE_TAG
            docker push $ECR_REGISTRY/prahari-$service_name:latest
          done

      - name: Update EKS Kubeconfig
        run: |
          aws eks update-kubeconfig --name prahari-prod-eks --region us-east-1

      - name: GitOps Sync Trigger (Production Rollout)
        run: |
          echo "Updating Production environment configurations for GitOps sync..."
          # Typically, update deployment files in a separate configurations repo
