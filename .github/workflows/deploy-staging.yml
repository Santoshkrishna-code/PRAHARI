name: Deploy to Staging

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'docs/**'
      - 'README.md'
      - 'LICENSE'

jobs:
  deploy-staging:
    name: Build & Push to Staging
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID_STAGING }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY_STAGING }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, Tag, and Push Microservices to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          for service_path in services/*-service; do
            service_name=$(basename $service_path)
            docker build -t $ECR_REGISTRY/prahari-$service_name:staging-$GITHUB_SHA -f $service_path/Dockerfile .
            docker push $ECR_REGISTRY/prahari-$service_name:staging-$GITHUB_SHA
          done

      - name: Update EKS Kubeconfig
        run: |
          aws eks update-kubeconfig --name prahari-staging-eks --region us-east-1

      - name: Deploy to EKS Staging Cluster
        run: |
          echo "Deploying to Staging..."
          # helm upgrade --install prahari-platform ./infrastructure/helm --namespace staging --set image.tag=staging-$GITHUB_SHA
