service:
  name: "{{ServiceName}}"
  version: "1.0.0"
  owner: "prahari-core"
  description: "Bootstrap microservice generated by PRAHARI CLI"

runtime:
  http: true
  grpc: true

database:
  type: "postgres"
  migrations: true

cache:
  redis: true

messaging:
  kafka: true

storage:
  s3: true

security:
  jwt: true
  rbac: true

observability:
  tracing: true
  metrics: true

deployment:
  replicas: 2
  port: {{Port}}

health:
  readiness: true
  liveness: true
